x-app-env: &app-env
  APP_ENV: production
  APP_KEY: base64:RiKsunydmXlW2UYfBJddOVpBA1471WV9rCwMxWJXa9A=
  APP_DEBUG: "false"
  DB_CONNECTION: mysql
  DB_HOST: db
  DB_PORT: 3306
  DB_DATABASE: db_gscm
  DB_USERNAME: gscm
  DB_PASSWORD: gscm_secret
  SESSION_DRIVER: database
  QUEUE_CONNECTION: database
  CACHE_STORE: database
  GNEWS_API_KEY: ${GNEWS_API_KEY:-}
  EXCHANGERATE_API_KEY: ${EXCHANGERATE_API_KEY:-}
  REST_COUNTRIES_API_KEY: ${REST_COUNTRIES_API_KEY:-}

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      <<: *app-env
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=0"]
    environment:
      <<: *app-env
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["php", "artisan", "schedule:work"]
    environment:
      <<: *app-env
    volumes:
      - storage_data:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: db_gscm
      MYSQL_USER: gscm
      MYSQL_PASSWORD: gscm_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  storage_data:
